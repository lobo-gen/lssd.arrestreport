<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LSSD Arrest Report Generator</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 6px;
}

textarea {
  width: 100%;
}

.charge-tag {
  display:inline-block;
  margin:3px;
  padding:4px 6px;
  border-radius:4px;
  border:1px solid;
}
</style>
</head>

<body>

<h2>LSSD Arrest Report Generator</h2>

<!-- TOP -->
<div class="section-grid">

<div class="card">
<h4>Suspect</h4>
<input id="suspectName" placeholder="Full Name"><br><br>

<label><input type="checkbox" id="hasVehicle"> Vehicle?</label>

<div id="vehicleFields" style="display:none;">
<input id="vehicleModel" placeholder="Model"><br>
<input id="vehicleColor" placeholder="Color"><br>
<input id="vehiclePlate" placeholder="Plate">
</div>
</div>

<div class="card">
<h4>Incident</h4>
<input type="date" id="date"><br><br>
<input type="time" id="time"><br><br>
<input id="address" placeholder="Address">
</div>

<div class="card">
<h4>Officer</h4>
<input id="officerName" placeholder="Name"><br>
<input id="officerRank" placeholder="Rank"><br>
<input id="officerBadge" placeholder="Badge"><br>
<input id="officerDivision" placeholder="Division">
</div>

</div>

<h3>Arrest Details</h3>

<div class="section-grid">

<!-- CHARGES -->
<div class="card">
<h4>Charges</h4>
<input id="chargeSearch" placeholder="Search...">
<div id="chargeDropdown"></div>
<div id="selectedCharges"></div>
</div>

<!-- WITNESSES -->
<div class="card">
<h4>Witnesses</h4>
<button onclick="addWitness()">+ Add</button>
<div id="witnessList"></div>
</div>

<!-- LEGAL -->
<div class="card">
<h4>Legal</h4>
<label><input type="checkbox" id="miranda"> Was suspect Mirandized?</label><br>
<label><input type="checkbox" id="medical"> Suspect received medical attention?</label>
</div>

<!-- PROCESSING -->
<div class="card">
<h4>Processing</h4>
<input id="processingLocation" placeholder="ex: Ganton Station"><br><br>

<label><input type="checkbox" id="mugshot"> Mugshot</label><br>
<label><input type="checkbox" id="fingerprints"> Fingerprints</label><br>
<label><input type="checkbox" id="dna"> DNA</label>
</div>

<!-- NARRATIVE -->
<div class="card">
<h4>Narrative (editable)</h4>
<textarea id="narrativePreview" rows="8"></textarea>
</div>

</div>

<br>

<button onclick="generate()">Generate Report</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="clearForm()">Clear</button>

<h3>Output</h3>
<textarea id="output" rows="15"></textarea>

<script src="crimes.js"></script>

<script>

// ================= SAFE GET =================
const $ = id => document.getElementById(id);

// ================= LOCAL STORAGE =================
document.querySelectorAll("input, textarea").forEach(el => {
  if (!el.id) return;

  const saved = localStorage.getItem(el.id);
  if (saved !== null) {
    if (el.type === "checkbox") el.checked = saved === "true";
    else el.value = saved;
  }

  el.addEventListener("input", () => {
    localStorage.setItem(el.id, el.type === "checkbox" ? el.checked : el.value);
  });
});

  // ================= AUTO NARRATIVE =================

let narrativeManuallyEdited = false;

const narrativeField = $("narrativePreview");

// detecta edição manual
narrativeField.addEventListener("input", () => {
  narrativeManuallyEdited = true;
});

// função que monta narrativa
function buildNarrative() {

  const address = $("address").value || "Unknown location";
  const date = $("date").value || "unknown date";
  const time = $("time").value || "unknown time";

  let legal = "";
  if ($("miranda").checked) {
    legal += " The suspect was Mirandized.";
  }

  if ($("medical").checked) {
    legal += " The suspect received medical attention.";
  }

  return `I was involved in an incident at ${address} on ${date} at approximately ${time} hours.

Upon arrival, I observed a situation requiring law enforcement intervention involving the listed suspect.

The suspect was detained and processed according to standard LSSD procedures.${legal}`;
}

// atualiza automaticamente
function updateNarrative() {
  if (!narrativeManuallyEdited) {
    narrativeField.value = buildNarrative();
  }
}

// campos que influenciam narrativa
[
  "address",
  "date",
  "time",
  "miranda",
  "medical"
].forEach(id => {
  const el = $(id);
  if (!el) return;

  el.addEventListener("input", updateNarrative);
  el.addEventListener("change", updateNarrative);
});

// inicializa ao carregar
updateNarrative();

// ================= VEHICLE =================
$("hasVehicle").onchange = () => {
  $("vehicleFields").style.display = $("hasVehicle").checked ? "block" : "none";
};

// ================= WITNESSES =================
function addWitness() {
  const div = document.createElement("div");

  div.innerHTML = `
    <input class="witnessName" placeholder="Name"><br>
    <input class="witnessPhone" placeholder="Phone"><br>
    <input class="witnessId" placeholder="ID"><br><br>
  `;

  $("witnessList").appendChild(div);
}

// ================= CHARGES =================
let selectedCharges = [];
let allCrimes = [];

if (typeof crimesData !== "undefined") {
  Object.values(crimesData).forEach(cat => {
    cat.forEach(c => allCrimes.push(c));
  });
}

$("chargeSearch").addEventListener("input", function() {
  const dropdown = $("chargeDropdown");
  dropdown.innerHTML = "";

  const val = this.value.toLowerCase();
  if (!val) return;

  allCrimes
    .filter(c => c.crime.toLowerCase().includes(val))
    .slice(0, 10)
    .forEach(c => {

      const color = c.classification === "Felony" ? "red" : "orange";

      const el = document.createElement("div");
      el.innerHTML = `<span style="color:${color}">${c.crime} (${c.code})</span>`;
      el.style.cursor = "pointer";

      el.onclick = () => {
        selectedCharges.push(c);
        renderCharges();
        $("chargeSearch").value = "";
        dropdown.innerHTML = "";
      };

      dropdown.appendChild(el);
    });
});

function renderCharges() {
  const container = $("selectedCharges");
  container.innerHTML = "";

  selectedCharges.forEach((c, i) => {
    const color = c.classification === "Felony" ? "red" : "orange";

    const tag = document.createElement("span");
    tag.className = "charge-tag";
    tag.style.color = color;
    tag.style.borderColor = color;

    tag.innerHTML = `${c.crime} <b style="cursor:pointer" onclick="removeCharge(${i})">×</b>`;

    container.appendChild(tag);
  });
}

function removeCharge(i) {
  selectedCharges.splice(i, 1);
  renderCharges();
}

// ================= GENERATE =================
function generate() {

  const name = $("suspectName").value || "Unknown";
  const date = $("date").value || "N/A";
  const time = $("time").value || "N/A";
  const address = $("address").value || "N/A";

  let vehicle = "N/A";
  if ($("hasVehicle").checked) {
    vehicle = `${$("vehicleModel").value} | ${$("vehicleColor").value} | Plate ${$("vehiclePlate").value}`;
  }

  const charges = selectedCharges.length
    ? selectedCharges.map(c => {
        const color = c.classification === "Felony" ? "red" : "orange";
        return `[color=${color}]- ${c.crime} (${c.code})[/color]`;
      }).join("\n")
    : "- None";

  const officer = `${$("officerName").value} | ${$("officerRank").value} | Badge #${$("officerBadge").value} | ${$("officerDivision").value}`;

  let witnesses = "";
  document.querySelectorAll("#witnessList div").forEach(el => {
    const n = el.querySelector(".witnessName")?.value || "";
    const p = el.querySelector(".witnessPhone")?.value || "";
    const i = el.querySelector(".witnessId")?.value || "";

    witnesses += `- ${n} | Phone Number ${p} | ID/License N° ${i}\n`;
  });

  witnesses = witnesses.trim() || "- None";

  let legal = "";
  if ($("miranda").checked) legal += " The suspect was Mirandized.";
  if ($("medical").checked) legal += " The suspect received medical attention.";

  let processing = `Suspect was processed at ${$("processingLocation").value || "Unknown"}.`;
  if ($("mugshot").checked) processing += " Mugshot taken.";
  if ($("fingerprints").checked) processing += " Fingerprints collected.";
  if ($("dna").checked) processing += " DNA collected.";

  let narrative = $("narrativePreview").value;

  if (!narrative) {
    narrative = `I was involved in an incident at ${address} on ${date} at approximately ${time} hours.

Upon arrival, I observed a situation requiring law enforcement intervention involving the listed suspect.

The suspect was detained and processed according to standard LSSD procedures.${legal}`;
  }

  const output = `
[departmentmanual]
[/departmentmanual]

[sectionheader][b][size=200][center]ARREST REPORT[/center][/size][/b][/sectionheader]

[sectionheader][b]SUSPECT INFORMATION[/b][/sectionheader]
[sectionbody][b]Name:[/b] ${name}
[b]Vehicle:[/b] ${vehicle}
[/sectionbody]

[sectionheader][b]INCIDENT INFORMATION[/b][/sectionheader]
[sectionbody][b]Date:[/b] ${date}
[b]Time:[/b] ${time}
[b]Location:[/b] ${address}[/sectionbody]

[sectionheader][b]CHARGES[/b][/sectionheader]
[sectionbody]${charges}[/sectionbody]

[sectionheader][b]NARRATIVE[/b][/sectionheader]
[sectionbody]${narrative}[/sectionbody]

[sectionheader][b]OFFICERS[/b][/sectionheader]
[sectionbody]- ${officer}[/sectionbody]

[sectionheader][b]WITNESSES[/b][/sectionheader]
[sectionbody]${witnesses}[/sectionbody]

[sectionheader][b]PROCESSING[/b][/sectionheader]
[sectionbody]${processing}[/sectionbody]
`.trim();

  $("output").value = output;
}

// ================= COPY =================
function copyOutput() {
  const out = $("output");
  out.select();
  document.execCommand("copy");
}

// ================= CLEAR =================
function clearForm() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
