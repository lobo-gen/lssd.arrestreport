<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>

  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
    }

    h3 {
      margin-top: 30px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .full { grid-column: span 4; }

    .box {
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    textarea {
      width: 100%;
    }

    /* NOVO: layout em colunas */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h2>LSSD Arrest Report Generator</h2>

<!-- ================= SUSPECT ================= -->
<h3>Suspect</h3>

<div class="grid">
  <div class="box">
    <label>Full Name</label>
    <input id="suspectName">
  </div>

  <div class="box full">
  <label>Mugshot URL</label>
  <input id="mugshotUrl">
</div>

  <div class="box">
    <label>
      <input type="checkbox" id="hasVehicle">
      Suspect had a vehicle
    </label>
  </div>
</div>

<div id="vehicleFields" class="grid hidden">
  <div class="box">
    <label>Model</label>
    <input id="vehicleModel">
  </div>

  <div class="box">
    <label>Color</label>
    <input id="vehicleColor">
  </div>

  <div class="box">
    <label>Plate</label>
    <input id="vehiclePlate">
  </div>
</div>

<!-- ================= INCIDENT ================= -->
<h3>Incident</h3>

<div class="grid">
  <div class="box">
    <label>Date</label>
    <input type="date" id="date">
  </div>

  <div class="box">
    <label>Time</label>
    <input type="time" id="time">
  </div>

  <div class="box full">
    <label>Address</label>
    <input id="address">
  </div>
</div>

<!-- ================= OFFICER ================= -->
<h3>Officer</h3>

<div class="grid">
  <div class="box">
    <label>Name</label>
    <input id="officerName">
  </div>

  <div class="box">
    <label>Rank</label>
    <input id="officerRank">
  </div>

  <div class="box">
    <label>Badge</label>
    <input id="officerBadge">
  </div>

  <div class="box">
    <label>Division</label>
    <input id="officerDivision">
  </div>
</div>

<label>
  <input type="checkbox" id="hasOfficers">
  Additional officers involved
</label>

<div id="additionalOfficers" class="hidden">
  <button onclick="addOfficer()">+ Add Additional Officer</button>
  <div id="officerList"></div>
</div>

<!-- ================= CASE DETAILS (NOVO) ================= -->
<h3>Case Details</h3>

<div class="section-grid">

  <!-- CHARGES -->
  <div class="card">
    <h4>Charges</h4>
    <input type="text" id="chargeSearch" placeholder="Search charges...">
    <div id="chargeDropdown"></div>
    <div id="selectedCharges"></div>
  </div>

  <!-- EVIDENCE -->
  <div class="card">
    <h4>Evidence</h4>
    <label>
      <input type="checkbox" id="hasEvidence"> Evidence collected?
    </label>

    <div id="evidenceField" class="hidden">
      <textarea id="evidenceText" rows="3" placeholder="Weapons, drugs, other..."></textarea>
    </div>
  </div>

  <!-- WITNESSES -->
  <div class="card">
    <h4>Witnesses</h4>
    <label>
      <input type="checkbox" id="hasWitnesses"> Witnesses present
    </label>

    <div id="witnessFields" class="hidden">
      <button onclick="addWitness()">+ Add</button>
      <div id="witnessList"></div>
    </div>
  </div>

  <!-- LEGAL -->
  <div class="card">
    <h4>Legal</h4>
    <label><input type="checkbox" id="miranda"> Suspect was Mirandized?</label><br>
    <label><input type="checkbox" id="medical"> Suspect received medical attention?</label>
  </div>

  <!-- PROCESSING -->
  <div class="card">
    <h4>Processing</h4>

    <input id="processingLocation" placeholder="Ganton Sheriff's Station etc."><br><br>

    <label><input type="checkbox" id="mugshot"> Mugshot taken?</label><br>
    <label><input type="checkbox" id="fingerprints"> Fingerprints collected?</label><br>
    <label><input type="checkbox" id="dna"> DNA collected?</label>
  </div>

</div>

<!-- ================= OUTPUT ================= -->
<br><br>
<button onclick="generate()">Generate Report</button>

<h3>Output</h3>
<textarea id="output" rows="15"></textarea>

<!-- ================= SCRIPT ================= -->

<script src="crimes.js"></script>

<script>

window.addEventListener("DOMContentLoaded", function () {

// ================= TOGGLES =================
document.getElementById("hasVehicle").onchange = function() {
  document.getElementById("vehicleFields").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasOfficers").onchange = function() {
  document.getElementById("additionalOfficers").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasEvidence").onchange = function() {
  document.getElementById("evidenceField").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasWitnesses").onchange = function() {
  document.getElementById("witnessFields").classList.toggle("hidden", !this.checked);
};

// ================= OFFICERS =================
function addOfficer() {
  const container = document.getElementById("officerList");

  const div = document.createElement("div");
  div.className = "grid";
  div.style.border = "1px solid #ccc";
  div.style.padding = "10px";
  div.style.marginTop = "10px";

  div.innerHTML = `
    <div class="box"><label>Name</label><input class="officerName"></div>
    <div class="box"><label>Rank</label><input class="officerRank"></div>
    <div class="box"><label>Badge</label><input class="officerBadge"></div>
    <div class="box"><label>Division</label><input class="officerDivision"></div>
    <div class="box full">
      <button type="button" onclick="this.parentElement.parentElement.remove()">Remove Officer</button>
    </div>
  `;

  container.appendChild(div);
}

window.addOfficer = addOfficer;

// ================= WITNESSES =================
function addWitness() {
  const container = document.getElementById("witnessList");

  const div = document.createElement("div");
  div.style.border = "1px solid #ccc";
  div.style.padding = "10px";
  div.style.marginTop = "10px";

  div.innerHTML = `
    <label>Full Name</label><br>
    <input class="witnessName"><br><br>

    <label>Phone Number</label><br>
    <input class="witnessPhone"><br><br>

    <label>ID / License Number</label><br>
    <input class="witnessId"><br><br>

    <button type="button" onclick="this.parentElement.remove()">Remove Witness</button>
  `;

  container.appendChild(div);
}

window.addWitness = addWitness;

// ================= CHARGES =================
let selectedCharges = [];

const searchInput = document.getElementById("chargeSearch");
const dropdown = document.getElementById("chargeDropdown");
const selectedDiv = document.getElementById("selectedCharges");

// safety check
if (typeof crimesData === "undefined") {
  console.error("crimesData not loaded. Check crimes.js");
} else {

  // flatten
  let allCrimes = [];

  Object.keys(crimesData).forEach(category => {
    crimesData[category].forEach(crime => {
      allCrimes.push(crime);
    });
  });

  // search
  searchInput.addEventListener("input", function() {
    const value = this.value.toLowerCase();
    dropdown.innerHTML = "";

    if (!value) return;

    const results = allCrimes.filter(c =>
      c.crime.toLowerCase().includes(value)
    );

    results.slice(0, 10).forEach(crime => {
      const item = document.createElement("div");

      const color = crime.classification === "Felony" ? "red" : "orange";

      item.style.cursor = "pointer";
      item.style.padding = "5px";
      item.style.borderBottom = "1px solid #ccc";
      item.style.color = color;

      item.innerText = `${crime.title} - ${crime.crime} (${crime.code})`;

      item.onclick = () => addCharge(crime);

      dropdown.appendChild(item);
    });
  });

  function addCharge(crime) {
    if (selectedCharges.find(c => c.title === crime.title)) return;

    selectedCharges.push(crime);
    renderSelected();

    searchInput.value = "";
    dropdown.innerHTML = "";
  }

  function renderSelected() {
    selectedDiv.innerHTML = "";

    selectedCharges.forEach((crime, index) => {
      const tag = document.createElement("span");

      const color = crime.classification === "Felony" ? "red" : "orange";

      tag.style.display = "inline-block";
      tag.style.margin = "3px";
      tag.style.padding = "5px 8px";
      tag.style.border = `1px solid ${color}`;
      tag.style.borderRadius = "5px";
      tag.style.color = color;

      tag.innerHTML = `
        ${crime.crime}
        <b style="cursor:pointer; margin-left:5px;" onclick="removeCharge(${index})">×</b>
      `;

      selectedDiv.appendChild(tag);
    });
  }

  window.removeCharge = function(index) {
    selectedCharges.splice(index, 1);
    renderSelected();
  };

  document.addEventListener("click", function(e) {
    if (!searchInput.contains(e.target)) {
      dropdown.innerHTML = "";
    }
  });

}

// ================= GENERATE =================
window.generate = function () {

  // ================= SUSPECT =================
  const name = document.getElementById("suspectName")?.value || "Unknown";

  const date = document.getElementById("date")?.value || "N/A";
  const time = document.getElementById("time")?.value || "N/A";
  const address = document.getElementById("address")?.value || "N/A";

  // ================= MUGSHOT =================
  const mugshot = document.getElementById("mugshotUrl")?.value || "";
  const mugshotBlock = mugshot
    ? `[img]${mugshot}[/img]\n`
    : "";

  // ================= VEHICLE =================
  let vehicle = "N/A";

  if (document.getElementById("hasVehicle")?.checked) {
    const model = document.getElementById("vehicleModel")?.value || "";
    const color = document.getElementById("vehicleColor")?.value || "";
    const plate = document.getElementById("vehiclePlate")?.value || "";

    vehicle = `${model} | ${color} | Plate ${plate}`;
  }

  // ================= CHARGES =================
  const charges = selectedCharges.length
    ? selectedCharges.map(c => `- ${c.crime} (${c.code})`).join("\n")
    : "- None";

  // ================= OFFICERS =================
  let officers = "";

  const mainOfficer =
    (document.getElementById("officerName")?.value || "") + " | " +
    (document.getElementById("officerRank")?.value || "") + " | " +
    "Badge #" + (document.getElementById("officerBadge")?.value || "") + " | " +
    (document.getElementById("officerDivision")?.value || "");

  officers += `- ${mainOfficer}`;

  document.querySelectorAll("#officerList .grid").forEach(el => {
    const n = el.querySelector(".officerName")?.value || "";
    const r = el.querySelector(".officerRank")?.value || "";
    const b = el.querySelector(".officerBadge")?.value || "";
    const d = el.querySelector(".officerDivision")?.value || "";

    officers += `\n- ${n} | ${r} | Badge #${b} | ${d}`;
  });

  officers = officers.trim();

  // ================= WITNESSES =================
  let witnesses = "";

  document.querySelectorAll("#witnessList > div").forEach(el => {
    const n = el.querySelector(".witnessName")?.value || "";
    const p = el.querySelector(".witnessPhone")?.value || "";
    const i = el.querySelector(".witnessId")?.value || "";

    witnesses += `- ${n} | Phone Number ${p} | ID/License N° ${i}\n`;
  });

  witnesses = witnesses.trim() || "- None";

  // ================= LEGAL INTO NARRATIVE =================
  const miranda = document.getElementById("miranda")?.checked;
  const medical = document.getElementById("medical")?.checked;

  let legalNarrative = "";

  if (miranda) {
    legalNarrative += " The suspect was Mirandized prior to arrest.";
  }

  if (medical) {
    legalNarrative += " Medical assistance was administered prior to transport to the processing facility.";
  }

  // ================= PROCESSING =================
  const processingLocation =
    document.getElementById("processingLocation")?.value || "Unknown Station";

  let processing = `Suspect was processed at ${processingLocation}.`;

  if (document.getElementById("mugshot")?.checked) processing += " Mugshot taken.";
  if (document.getElementById("fingerprints")?.checked) processing += " Fingerprints collected";
  if (document.getElementById("dna")?.checked) processing += " DNA collected";

  // ================= NARRATIVE =================
  const narrative = `
I was involved in an incident at ${address} on ${date} at approximately ${time} hours. 

Upon arrival, I observed a situation requiring law enforcement intervention involving the listed suspect.

The suspect was detained and processed according to standard LSSD procedures.${legalNarrative}
  `.trim();

  // ================= OUTPUT =================
const output = `
[departmentmanual]
[/departmentmanual]

[sectionheader][b][size=200][center]ARREST REPORT[/center][/size][/b][/sectionheader]

[sectionheader][b]SUSPECT INFORMATION[/b][/sectionheader]
[sectionbody][b]Name:[/b] ${name}
[b]Vehicle:[/b] ${vehicle}
${mugshotBlock}[/sectionbody]

[sectionheader][b]INCIDENT INFORMATION[/b][/sectionheader]
[sectionbody][b]Date:[/b] ${date}
[b]Time:[/b] ${time}
[b]Location:[/b] ${address}[/sectionbody]

[sectionheader][b]CHARGES[/b][/sectionheader]
[sectionbody]${charges}[/sectionbody]

[sectionheader][b]NARRATIVE[/b][/sectionheader]
[sectionbody]${narrative}[/sectionbody]

[sectionheader][b]OFFICERS[/b][/sectionheader]
[sectionbody]${officers}[/sectionbody]

[sectionheader][b]WITNESSES[/b][/sectionheader]
[sectionbody]${witnesses}[/sectionbody]

[sectionheader][b]PROCESSING[/b][/sectionheader]
[sectionbody]${processing}[/sectionbody]
`.trim();

  document.getElementById("output").value = output;
};

});

</script>

</body>
</html>
