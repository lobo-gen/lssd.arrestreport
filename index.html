<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>

  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
    }

    h3 {
      margin-top: 30px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .full {
      grid-column: span 4;
    }

    .half {
      grid-column: span 2;
    }

    .box {
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    textarea {
      width: 100%;
    }

    button {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>LSSD Arrest Report Generator</h2>

<!-- ================= SUSPECT ================= -->
<h3>Suspect</h3>

<div class="grid">
  <div class="box">
    <label>Full Name</label>
    <input id="suspectName">
  </div>

  <div class="box">
    <label>
      <input type="checkbox" id="hasVehicle">
      Suspect had a vehicle
    </label>
  </div>
</div>

<div id="vehicleFields" class="grid hidden">
  <div class="box">
    <label>Model</label>
    <input id="vehicleModel">
  </div>

  <div class="box">
    <label>Color</label>
    <input id="vehicleColor">
  </div>

  <div class="box">
    <label>Plate</label>
    <input id="vehiclePlate">
  </div>
</div>

<!-- ================= INCIDENT ================= -->
<h3>Incident</h3>

<div class="grid">
  <div class="box">
    <label>Date</label>
    <input type="date" id="date">
  </div>

  <div class="box">
    <label>Time</label>
    <input type="time" id="time">
  </div>

  <div class="box full">
    <label>Address</label>
    <input id="address">
  </div>
</div>

<!-- ================= OFFICER ================= -->
<h3>Officer</h3>

<div class="grid">
  <div class="box">
    <label>Name</label>
    <input id="officerName">
  </div>

  <div class="box">
    <label>Rank</label>
    <input id="officerRank">
  </div>

  <div class="box">
    <label>Badge</label>
    <input id="officerBadge">
  </div>

  <div class="box">
    <label>Division</label>
    <input id="officerDivision">
  </div>
</div>

<label>
  <input type="checkbox" id="hasOfficers">
  Additional officers involved
</label>

<div id="additionalOfficers" class="hidden">
  <button onclick="addOfficer()">+ Add Additional Officer</button>
  <div id="officerList"></div>
</div>

<!-- ================= CHARGES ================= -->
<h3>Charges</h3>

<input type="text" id="chargeSearch" placeholder="Search charges...">
<div id="chargeDropdown"></div>
<div id="selectedCharges"></div>

<!-- ================= EVIDENCE ================= -->
<h3>Evidence</h3>

<label>
  <input type="checkbox" id="hasEvidence">
  Evidence collected
</label>

<div id="evidenceField" class="hidden">
  <textarea id="evidenceText" rows="4" placeholder="Weapons, drugs, other..."></textarea>
</div>

<!-- ================= WITNESSES ================= -->
<h3>Witnesses</h3>

<label>
  <input type="checkbox" id="hasWitnesses">
  Witnesses present
</label>

<div id="witnessFields" class="hidden">
  <button onclick="addWitness()">+ Add Witness</button>
  <div id="witnessList"></div>
</div>

<!-- ================= LEGAL ================= -->
<h3>Legal</h3>

<label><input type="checkbox" id="miranda"> Suspect was mirandized</label><br>
<label><input type="checkbox" id="medical"> Medical attention provided</label>

<!-- ================= PROCESSING ================= -->
<h3>Processing</h3>

<div class="grid">
  <div class="box full">
    <label>Processing Location</label>
    <input id="processingLocation">
  </div>
</div>

<label><input type="checkbox" id="mugshot"> Mugshot taken</label><br>
<label><input type="checkbox" id="fingerprints"> Fingerprints collected</label><br>
<label><input type="checkbox" id="dna"> DNA collected</label>

<!-- ================= OUTPUT ================= -->
<br><br>
<button onclick="generate()">Generate Report</button>

<h3>Output</h3>
<textarea id="output" rows="15"></textarea>

<!-- ================= SCRIPT ================= -->
<script>

// TOGGLES
document.getElementById("hasVehicle").onchange = function() {
  document.getElementById("vehicleFields").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasOfficers").onchange = function() {
  document.getElementById("additionalOfficers").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasEvidence").onchange = function() {
  document.getElementById("evidenceField").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasWitnesses").onchange = function() {
  document.getElementById("witnessFields").classList.toggle("hidden", !this.checked);
};

// PLACEHOLDERS (próximo passo)
function addOfficer() {}
function addWitness() {}
function generate() {}

</script>

</body>
</html>
