<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .full { grid-column: span 4; }

    .hidden { display: none; }

    textarea {
      width: 100%;
      resize: none;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 6px;
    }

    button {
      background: #2b2b2b;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<h2>LSSD Arrest Report Generator</h2>

<div class="section">
<h3>Suspect</h3>
<div class="grid">
<input id="suspectName" placeholder="John Doe">
<label><input type="checkbox" id="hasVehicle"> Vehicle?</label>
</div>

<div id="vehicleFields" class="grid hidden">
<input id="vehicleModel" placeholder="Model">
<input id="vehicleColor" placeholder="Color">
<input id="vehiclePlate" placeholder="Plate">
</div>
</div>

<div class="section">
<h3>Incident</h3>
<div class="grid">
<input type="date" id="date">
<input type="time" id="time">
<input class="full" id="address" placeholder="Location">
</div>
</div>

<div class="section">
<h3>Officer</h3>
<div class="grid">
<input id="officerName" placeholder="Name">
<input id="officerRank" placeholder="Rank">
<input id="officerBadge" placeholder="Badge">
<input id="officerDivision" placeholder="Division">
</div>
</div>

<div class="section">
<h3>Case Details</h3>

<div class="section-grid">

<div class="card">
<h4>Charges</h4>
<input id="chargeSearch" placeholder="Search charges...">
<div id="chargeDropdown"></div>
<div id="selectedCharges"></div>
</div>

<div class="card">
<h4>Witnesses</h4>
<label><input type="checkbox" id="hasWitnesses"> Witnesses?</label>
<div id="witnessFields" class="hidden">
<button onclick="addWitness()">+ Add</button>
<div id="witnessList"></div>
</div>
</div>

<div class="card">
<h4>Legal</h4>
<label><input type="checkbox" id="miranda"> Was suspect mirandized?</label><br>
<label><input type="checkbox" id="medical"> Suspect received medical attention?</label>
</div>

<div class="card full">
<h4>Processing</h4>

<input id="processingLocation" placeholder="Which station suspect was processed">

<div style="margin-top:10px;">
<label><input type="checkbox" id="mugshot"> Mugshot taken?</label><br>
<label><input type="checkbox" id="fingerprints"> Fingerprints collected?</label><br>
<label><input type="checkbox" id="dna"> DNA collected?</label>
</div>

</div>

</div>
</div>

<button onclick="generate()">Generate</button>
<button onclick="copyOutput()">Copy</button>

<h3>Output</h3>
<textarea id="output" rows="10"></textarea>

<script src="crimes.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

// toggles
document.getElementById("hasVehicle").onchange = e =>
  document.getElementById("vehicleFields").classList.toggle("hidden", !e.target.checked);

document.getElementById("hasWitnesses").onchange = e =>
  document.getElementById("witnessFields").classList.toggle("hidden", !e.target.checked);

// witnesses
window.addWitness = () => {
  const div = document.createElement("div");
  div.innerHTML = `
    <input class="witnessName" placeholder="Name">
    <input class="witnessPhone" placeholder="Phone">
    <input class="witnessId" placeholder="ID">
  `;
  document.getElementById("witnessList").appendChild(div);
};

// charges
let selectedCharges = [];

document.getElementById("chargeSearch").addEventListener("input", function() {
  const val = this.value.toLowerCase();
  const dropdown = document.getElementById("chargeDropdown");
  dropdown.innerHTML = "";

  if (!val) return;

  let all = [];
  Object.values(crimesData).forEach(arr => all.push(...arr));

  all.filter(c => c.crime.toLowerCase().includes(val)).slice(0,10)
  .forEach(c => {
    const div = document.createElement("div");
    div.innerText = `${c.crime} (${c.code})`;
    div.style.cursor = "pointer";

    div.onclick = () => {
      selectedCharges.push(c);
      renderCharges();
      this.value = "";
      dropdown.innerHTML = "";
    };

    dropdown.appendChild(div);
  });
});

function renderCharges() {
  selectedCharges.sort((a,b) =>
    a.classification === b.classification ? 0 :
    a.classification === "Felony" ? -1 : 1
  );

  const container = document.getElementById("selectedCharges");
  container.innerHTML = "";

  selectedCharges.forEach((c,i)=>{
    const span = document.createElement("span");
    span.innerHTML = `${c.crime} <b style="cursor:pointer" onclick="removeCharge(${i})">×</b>`;
    container.appendChild(span);
  });
}

window.removeCharge = i => {
  selectedCharges.splice(i,1);
  renderCharges();
};

// GENERATE
window.generate = function() {

  const get = id => document.getElementById(id);

  const name = get("suspectName").value || "Unknown";
  const date = get("date").value || "N/A";
  const time = get("time").value || "N/A";
  const address = get("address").value || "N/A";

  let vehicle = "N/A";
  if (get("hasVehicle").checked) {
    vehicle = `${get("vehicleModel").value} | ${get("vehicleColor").value} | Plate ${get("vehiclePlate").value}`;
  }

  const charges = selectedCharges.length
    ? selectedCharges.map(c =>
      `[color=${c.classification==="Felony"?"red":"orange"}]- ${c.crime} (${c.code})[/color]`
    ).join("\n")
    : "- None";

  const officers = `- ${get("officerName").value} | ${get("officerRank").value} | Badge #${get("officerBadge").value} | ${get("officerDivision").value}`;

  let witnesses = "";
  document.querySelectorAll("#witnessList div").forEach(el=>{
    witnesses += `- ${el.children[0].value} | Phone Number ${el.children[1].value} | ID/License N° ${el.children[2].value}\n`;
  });
  witnesses = witnesses.trim() || "- None";

  let legal = "";
  if (get("miranda").checked) legal += " The suspect was Mirandized prior to arrest.";
  if (get("medical").checked) legal += " Medical assistance was administered prior to transport.";

  let processing = `Suspect was processed at ${get("processingLocation").value || "Unknown Station"}.`;
  if (get("mugshot").checked) processing += " Mugshot taken.";
  if (get("fingerprints").checked) processing += " Fingerprints collected.";
  if (get("dna").checked) processing += " DNA collected.";

  const narrative = `
I was involved in an incident at ${address} on ${date} at approximately ${time} hours.

Upon arrival, I observed the suspect ${name} on scene.

The suspect was detained without further incident and processed according to standard LSSD procedures.${legal}
`.trim();

  const output = `
[departmentmanual]
[/departmentmanual]

[sectionheader][b][size=200][center]ARREST REPORT[/center][/size][/b][/sectionheader]

[sectionheader][b]SUSPECT INFORMATION[/b][/sectionheader]
[sectionbody][b]Name:[/b] ${name}
[b]Vehicle:[/b] ${vehicle}
[/sectionbody]

[sectionheader][b]INCIDENT INFORMATION[/b][/sectionheader]
[sectionbody][b]Date:[/b] ${date}
[b]Time:[/b] ${time}
[b]Location:[/b] ${address}
[/sectionbody]

[sectionheader][b]CHARGES[/b][/sectionheader]
[sectionbody]${charges}[/sectionbody]

[sectionheader][b]NARRATIVE[/b][/sectionheader]
[sectionbody]${narrative}[/sectionbody]

[sectionheader][b]OFFICERS[/b][/sectionheader]
[sectionbody]${officers}[/sectionbody]

[sectionheader][b]WITNESSES[/b][/sectionheader]
[sectionbody]${witnesses}[/sectionbody]

[sectionheader][b]PROCESSING[/b][/sectionheader]
[sectionbody]${processing}[/sectionbody]
`.trim();

  get("output").value = output;

  const textarea = get("output");
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
};

// COPY
window.copyOutput = () => {
  const el = document.getElementById("output");
  el.select();
  document.execCommand("copy");
};

});

</script>

</body>
</html>
