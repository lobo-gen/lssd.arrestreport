<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>
</head>

<body style="font-family: Arial; max-width: 900px; margin: auto;">

<h2>LSSD Arrest Report Generator</h2>

<!-- ================= SUSPECT ================= -->
<h3>Suspect Information</h3>

<label>Full Name:</label><br>
<input id="suspectName"><br><br>

<label>Was the suspect in a vehicle?</label><br>
<select id="hasVehicle">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<div id="vehicleFields" style="display:none; margin-left:20px;">
  <label>Vehicle Model:</label><br>
  <input id="vehicleModel"><br>

  <label>Vehicle Color:</label><br>
  <input id="vehicleColor"><br>

  <label>License Plate:</label><br>
  <input id="vehiclePlate"><br><br>
</div>

<!-- ================= INCIDENT ================= -->
<h3>Incident Information</h3>

<label>Date:</label><br>
<input type="date" id="date"><br><br>

<label>Time:</label><br>
<input type="time" id="time"><br><br>

<label>Address:</label><br>
<input id="address"><br><br>

<!-- ================= OFFICER ================= -->
<h3>Officer Information</h3>

<label>Name:</label><br>
<input id="officerName"><br>

<label>Rank:</label><br>
<input id="officerRank"><br>

<label>Badge Number:</label><br>
<input id="officerBadge"><br>

<label>Division:</label><br>
<input id="officerDivision"><br><br>

<label>Were additional officers involved?</label><br>
<select id="hasOfficers">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<div id="additionalOfficers" style="display:none; margin-left:20px;">
  <button type="button" onclick="addOfficer()">+ Add Additional Officer</button>
  <div id="officerList"></div>
</div>

<!-- ================= CHARGES ================= -->
<h3>Charges</h3>

<input type="text" id="chargeSearch" placeholder="Search charges...">
<div id="chargeDropdown"></div>
<div id="selectedCharges"></div>

<!-- ================= EVIDENCE ================= -->
<h3>Evidence</h3>

<label>Were any evidences collected?</label><br>
<select id="hasEvidence">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<div id="evidenceField" style="display:none; margin-left:20px;">
  <textarea id="evidenceText" placeholder="Weapons, drugs, other..." rows="4" style="width:100%;"></textarea>
</div>

<!-- ================= WITNESSES ================= -->
<h3>Witnesses</h3>

<label>Were there any witnesses?</label><br>
<select id="hasWitnesses">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<div id="witnessFields" style="display:none; margin-left:20px;">
  <button type="button" onclick="addWitness()">+ Add Witness</button>
  <div id="witnessList"></div>
</div>

<!-- ================= LEGAL ================= -->
<h3>Legal</h3>

<label>Was the suspect mirandized?</label><br>
<select id="miranda">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<label>Was medical attention provided?</label><br>
<select id="medical">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<!-- ================= PROCESSING ================= -->
<h3>Processing</h3>

<label>Processing Location:</label><br>
<input id="processingLocation"><br><br>

<label>Mugshot taken?</label><br>
<select id="mugshot">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<label>Fingerprints collected?</label><br>
<select id="fingerprints">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<label>DNA collected?</label><br>
<select id="dna">
  <option value="no">No</option>
  <option value="yes">Yes</option>
</select><br><br>

<!-- ================= NARRATIVE ================= -->
<h3>Narratives</h3>

<label>Pre-Arrest Narrative:</label><br>
<textarea id="preNarrative" rows="4" style="width:100%;"></textarea><br><br>

<label>Post-Arrest Narrative:</label><br>
<textarea id="postNarrative" rows="4" style="width:100%;"></textarea><br><br>

<!-- ================= OUTPUT ================= -->
<button onclick="generate()">Generate Report</button>

<h3>Output</h3>
<textarea id="output" rows="15" style="width:100%;"></textarea>

<!-- ================= BASIC SCRIPT (UI ONLY) ================= -->
<script>
document.getElementById("hasVehicle").onchange = function() {
  document.getElementById("vehicleFields").style.display =
    this.value === "yes" ? "block" : "none";
};

document.getElementById("hasOfficers").onchange = function() {
  document.getElementById("additionalOfficers").style.display =
    this.value === "yes" ? "block" : "none";
};

document.getElementById("hasEvidence").onchange = function() {
  document.getElementById("evidenceField").style.display =
    this.value === "yes" ? "block" : "none";
};

document.getElementById("hasWitnesses").onchange = function() {
  document.getElementById("witnessFields").style.display =
    this.value === "yes" ? "block" : "none";
};

// placeholders for dynamic features
function addOfficer() {}
function addWitness() {}
function generate() {}
</script>

</body>
</html>
