<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LSSD Arrest Report Generator</title>

<meta property="og:title" content="LSSD Arrest Report Generator">
<meta property="og:description" content="Generate professional arrest reports for LSSD.">
<meta property="og:image" content="https://lobo-gen.github.io/lssd-arrestreport/lssd.png?v=2">
<meta property="og:type" content="website">
<meta property="og:url" content="https://lobo-gen.github.io/lobo.github.io/">

<meta name="theme-color" content="#2E3E2B">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" type="image/png" href="favicon.png">

<style>
body {
  font-family: Arial;
  max-width: 1100px;
  margin: auto;
  background-color: #2E3E2B;
  color: #fff;
}

.section-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 10px;
  border-radius: 6px;
  background: #fff;
  color: #111;
}

textarea {
  width: 100%;
}

.charge-tag {
  display:inline-block;
  margin:3px;
  padding:4px 6px;
  border-radius:4px;
  border:1px solid;
}

#selectedCharges {
  margin-top:5px;
}

.charge-tag b {
  margin-left:5px;
  cursor:pointer;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin: 20px 0 30px 0;
  padding-bottom: 10px;
  border-bottom: 2px solid #556B2F;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
}

.header img {
  width: 65px;
}

.header h2 {
  margin: 0;
}
</style>
</head>

<body>

<div class="header">
  <img src="sheriff.png">
  <h2>LSSD Arrest Report Generator</h2>
</div>

<div class="section-grid">

<div class="card">
<h4>Suspect</h4>
<input id="suspectName" placeholder="Full Name"><br><br>

<label><input type="checkbox" id="hasVehicle"> Was the suspect in a vehicle?</label>

<div id="vehicleFields" style="display:none;">
<input id="vehicleModel" placeholder="Model"><br>
<input id="vehicleColor" placeholder="Color"><br>
<input id="vehiclePlate" placeholder="Plate">
</div>
</div>

<div class="card">
<h4>Incident</h4>
<input type="date" id="date"><br><br>
<input type="time" id="time"><br><br>
<input id="address" placeholder="Incident Address">
</div>

<div class="card">
<h4>Officer</h4>
<input id="officerName" placeholder="Name"><br>
<input id="officerRank" placeholder="Rank"><br>
<input id="officerBadge" placeholder="Badge"><br>
<input id="officerDivision" placeholder="Division">

<br>
<label><input type="checkbox" id="hasOfficers"> Additional officers involved?</label>

<div id="officerList" style="display:none;"></div>
<button id="addOfficerBtn" onclick="addOfficer()" style="display:none;">+ Add Officer</button>
</div>

</div>

<h3>Arrest Details</h3>

<div class="section-grid">

<div class="card">
<h4>Charges</h4>
<input id="chargeSearch" placeholder="Search...">
<div id="chargeDropdown"></div>
<div id="selectedCharges"></div>
</div>

<div class="card">
<h4>Witnesses</h4>
<button onclick="addWitness()">+ Add</button>
<div id="witnessList"></div>
</div>

<div class="card">
<h4>Legal</h4>
<label><input type="checkbox" id="miranda"> Was suspect Mirandized?</label><br>
<label><input type="checkbox" id="medical"> Suspect received medical attention?</label>
</div>

<div class="card">
<h4>Processing</h4>
<input id="processingLocation" placeholder="e.g. Ganton Station"><br><br>

<label><input type="checkbox" id="mugshot"> Mugshot taken?</label><br>
<label><input type="checkbox" id="fingerprints"> Fingerprints taken?</label><br>
<label><input type="checkbox" id="dna"> DNA collected?</label>
</div>

<div class="card">
<h4>Evidence</h4>
<textarea id="evidence" rows="5"></textarea>
</div>

<div class="card">
<h4>Narrative</h4>
<textarea id="narrativePreview" rows="8"></textarea>
</div>

</div>

<br>

<button onclick="generate()">Generate Report</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="clearForm()">Clear</button>

<h3>Output</h3>
<textarea id="output" rows="15"></textarea>

<script src="crimes.js"></script>

<script>

const $ = id => document.getElementById(id);

// VEHICLE TOGGLE
$("hasVehicle").onchange = () => {
  $("vehicleFields").style.display = $("hasVehicle").checked ? "block" : "none";
};

// OFFICERS
$("hasOfficers").onchange = () => {
  const show = $("hasOfficers").checked;
  $("officerList").style.display = show ? "block" : "none";
  $("addOfficerBtn").style.display = show ? "inline-block" : "none";
};

function addOfficer() {
  const div = document.createElement("div");

  div.innerHTML = `
    <input class="officerName" placeholder="Name"><br>
    <input class="officerRank" placeholder="Rank"><br>
    <input class="officerBadge" placeholder="Badge"><br>
    <input class="officerDivision" placeholder="Division"><br><br>
  `;

  $("officerList").appendChild(div);
}

// WITNESSES
function addWitness() {
  const div = document.createElement("div");

  div.innerHTML = `
    <input class="witnessName" placeholder="Name"><br>
    <input class="witnessPhone" placeholder="Phone"><br>
    <input class="witnessId" placeholder="ID"><br><br>
  `;

  $("witnessList").appendChild(div);
}

// ================= GENERATE =================
function generate() {

  const name = $("suspectName").value || "Unknown";
  const rawDate = $("date").value;
  const date = rawDate || "N/A";
  const time = $("time").value || "N/A";
  const address = $("address").value || "N/A";

  const officerName = $("officerName").value || "";
  const officerRank = $("officerRank").value || "";
  const officerBadge = $("officerBadge").value || "";
  const officerDivision = $("officerDivision").value || "";

  function generateReportID() {
    if (!officerName || !rawDate) return "XX000000";

    const parts = officerName.trim().split(" ").filter(Boolean);
    if (parts.length < 2) return "XX000000";

    const initials = (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();

    const d = new Date(rawDate);
    if (isNaN(d)) return "XX000000";

    const day = String(d.getDate()).padStart(2, '0');
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const year = String(d.getFullYear()).slice(-2);

    return `${initials}${day}${month}${year}`;
  }

  const reportID = generateReportID();

  let vehicle = "N/A";
  if ($("hasVehicle").checked) {
    vehicle = `${$("vehicleModel").value} | ${$("vehicleColor").value} | Plate ${$("vehiclePlate").value}`;
  }

  let additionalOfficers = "";
  document.querySelectorAll("#officerList div").forEach(el => {
    const n = el.querySelector(".officerName")?.value || "";
    const r = el.querySelector(".officerRank")?.value || "";
    const b = el.querySelector(".officerBadge")?.value || "";
    const d = el.querySelector(".officerDivision")?.value || "";

    additionalOfficers += `- ${n} | ${r} | Badge #${b} | ${d}\n`;
  });

  additionalOfficers = additionalOfficers.trim() || "- None";

  let witnesses = "";
  document.querySelectorAll("#witnessList div").forEach(el => {
    const n = el.querySelector(".witnessName")?.value || "";
    const p = el.querySelector(".witnessPhone")?.value || "";
    const i = el.querySelector(".witnessId")?.value || "";

    witnesses += `- ${n} | Phone ${p} | ID ${i}\n`;
  });

  witnesses = witnesses.trim() || "- None";

  let processing = `Suspect was processed at ${$("processingLocation").value || "Unknown"}.`;
  if ($("mugshot").checked) processing += " Mugshot taken.";
  if ($("fingerprints").checked) processing += " Fingerprints collected.";
  if ($("dna").checked) processing += " DNA collected.";

  const narrative = $("narrativePreview").value;
  const evidence = $("evidence").value || "None";

  const output = `
[b][size=200]ARREST REPORT - ${reportID}[/size][/b]

[table][tr]
[td][b]SUSPECT NAME:[/b] ${name}[/td]
[td][b]DATE:[/b] ${date}[/td]
[td][b]TIME:[/b] ${time}[/td]
[/tr][/table]

[table][tr]
[td][b]LOCATION:[/b] ${address}[/td]
[td][b]VEHICLE:[/b] ${vehicle}[/td]
[/tr][/table]

[table][tr]
[td][b]OFFICER NAME:[/b] ${officerName}[/td]
[td][b]RANK:[/b] ${officerRank}[/td]
[td][b]BADGE #:[/b] ${officerBadge}[/td]
[td][b]DIVISION:[/b] ${officerDivision}[/td]
[/tr][/table]

[table][tr]
[td][b]ADDITIONAL OFFICERS[/b]

${additionalOfficers}

[/td]
[/tr][/table]

[table][tr]
[td][b]CHARGES[/b][/td]
[td][b]EVIDENCE[/b][/td]
[/tr]
[tr]
[td]
- None
[/td]
[td]
${evidence}
[/td]
[/tr][/table]

[table][tr]
[td][b]WITNESSES[/b][/td]
[td][b]PROCESSING[/b][/td]
[/tr]
[tr]
[td]
${witnesses}
[/td]
[td]
${processing}
[/td]
[/tr][/table]

[table][tr]
[td][b]NARRATIVE[/b]

${narrative}

[/td]
[/tr][/table]
`.trim();

  $("output").value = output;
}

function copyOutput() {
  $("output").select();
  document.execCommand("copy");
}

function clearForm() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
