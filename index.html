<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
    }

    h3 {
      margin-bottom: 10px;
    }

    .section {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .full { grid-column: span 4; }

    .box {
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    textarea {
      width: 100%;
      resize: none;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 6px;
    }

    button {
      background: #2b2b2b;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 5px;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>

<body>

<h2>LSSD Arrest Report Generator</h2>

<div class="section">
<h3>Suspect</h3>

<div class="grid">
  <div class="box">
    <label>Full Name</label>
    <input id="suspectName" placeholder="John Doe">
  </div>

  <div class="box">
    <label>
      <input type="checkbox" id="hasVehicle">
      Suspect had a vehicle
    </label>
  </div>
</div>

<div id="vehicleFields" class="grid hidden">
  <input id="vehicleModel" placeholder="Model">
  <input id="vehicleColor" placeholder="Color">
  <input id="vehiclePlate" placeholder="Plate">
</div>
</div>

<div class="section">
<h3>Incident</h3>

<div class="grid">
  <input type="date" id="date">
  <input type="time" id="time">
  <input class="full" id="address" placeholder="Location / Address">
</div>
</div>

<div class="section">
<h3>Officer</h3>

<div class="grid">
  <input id="officerName" placeholder="Name">
  <input id="officerRank" placeholder="Rank">
  <input id="officerBadge" placeholder="Badge #">
  <input id="officerDivision" placeholder="Division">
</div>

<label>
  <input type="checkbox" id="hasOfficers"> Additional officers
</label>

<div id="additionalOfficers" class="hidden">
  <button onclick="addOfficer()">+ Add Officer</button>
  <div id="officerList"></div>
</div>
</div>

<div class="section">
<h3>Case Details</h3>

<div class="section-grid">

<div class="card">
<h4>Charges</h4>
<input id="chargeSearch" placeholder="Search charges...">
<div id="chargeDropdown"></div>
<div id="selectedCharges"></div>
</div>

<div class="card">
<h4>Evidence</h4>
<label><input type="checkbox" id="hasEvidence"> Evidence collected?</label>
<textarea id="evidenceText" class="hidden" rows="3"></textarea>
</div>

<div class="card">
<h4>Witnesses</h4>
<label><input type="checkbox" id="hasWitnesses"> Witnesses?</label>
<div id="witnessFields" class="hidden">
<button onclick="addWitness()">+ Add</button>
<div id="witnessList"></div>
</div>
</div>

<div class="card">
<h4>Legal</h4>
<label><input type="checkbox" id="miranda"> Mirandized</label><br>
<label><input type="checkbox" id="medical"> Medical</label>
</div>

<div class="card">
<h4>Processing</h4>
<input id="processingLocation" placeholder="Station">
<label><input type="checkbox" id="mugshot"> Mugshot</label>
<label><input type="checkbox" id="fingerprints"> Fingerprints</label>
<label><input type="checkbox" id="dna"> DNA</label>
</div>

</div>
</div>

<button onclick="generate()">Generate</button>
<button onclick="copyOutput()">Copy</button>
<button onclick="clearForm()">Clear</button>

<h3>Output</h3>
<textarea id="output" rows="10"></textarea>

<script src="crimes.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

// toggles
hasVehicle.onchange = () => vehicleFields.classList.toggle("hidden", !hasVehicle.checked);
hasOfficers.onchange = () => additionalOfficers.classList.toggle("hidden", !hasOfficers.checked);
hasWitnesses.onchange = () => witnessFields.classList.toggle("hidden", !hasWitnesses.checked);
hasEvidence.onchange = () => evidenceText.classList.toggle("hidden", !hasEvidence.checked);

// officers
window.addOfficer = () => {
  const div = document.createElement("div");
  div.innerHTML = `
    <input class="officerName" placeholder="Name">
    <input class="officerRank" placeholder="Rank">
    <input class="officerBadge" placeholder="Badge">
    <input class="officerDivision" placeholder="Division">
  `;
  officerList.appendChild(div);
};

// witnesses
window.addWitness = () => {
  const div = document.createElement("div");
  div.innerHTML = `
    <input class="witnessName" placeholder="Name">
    <input class="witnessPhone" placeholder="Phone">
    <input class="witnessId" placeholder="ID">
  `;
  witnessList.appendChild(div);
};

// charges
let selectedCharges = [];

chargeSearch.addEventListener("input", () => {
  chargeDropdown.innerHTML = "";
  const val = chargeSearch.value.toLowerCase();

  if (!val) return;

  let all = [];
  Object.values(crimesData).forEach(arr => all.push(...arr));

  all.filter(c => c.crime.toLowerCase().includes(val)).slice(0,10)
  .forEach(c => {
    const div = document.createElement("div");
    div.innerText = `${c.crime} (${c.code})`;
    div.onclick = () => {
      selectedCharges.push(c);
      renderCharges();
      chargeSearch.value = "";
      chargeDropdown.innerHTML = "";
    };
    chargeDropdown.appendChild(div);
  });
});

function renderCharges() {
  selectedCharges.sort((a,b) =>
    a.classification === b.classification ? 0 :
    a.classification === "Felony" ? -1 : 1
  );

  selectedChargesDiv.innerHTML = "";

  selectedCharges.forEach((c,i)=>{
    const span = document.createElement("span");
    span.innerHTML = `${c.crime} <b onclick="removeCharge(${i})">×</b>`;
    selectedChargesDiv.appendChild(span);
  });
}

window.removeCharge = i => {
  selectedCharges.splice(i,1);
  renderCharges();
};

// generate
window.generate = () => {

  const name = suspectName.value || "Unknown";
  const date = date.value || "N/A";
  const time = time.value || "N/A";
  const address = address.value || "N/A";

  let vehicle = "N/A";
  if (hasVehicle.checked)
    vehicle = `${vehicleModel.value} | ${vehicleColor.value} | Plate ${vehiclePlate.value}`;

  const charges = selectedCharges.length
    ? selectedCharges.map(c =>
        `[color=${c.classification==="Felony"?"red":"orange"}]- ${c.crime} (${c.code})[/color]`
      ).join("\n")
    : "- None";

  let officers = `- ${officerName.value} | ${officerRank.value} | Badge #${officerBadge.value} | ${officerDivision.value}`;

  document.querySelectorAll("#officerList div").forEach(el=>{
    officers += `\n- ${el.children[0].value} | ${el.children[1].value} | Badge #${el.children[2].value} | ${el.children[3].value}`;
  });

  let witnesses = "";
  document.querySelectorAll("#witnessList div").forEach(el=>{
    witnesses += `- ${el.children[0].value} | Phone Number ${el.children[1].value} | ID/License N° ${el.children[2].value}\n`;
  });
  witnesses = witnesses.trim() || "- None";

  let legal = "";
  if (miranda.checked) legal += " The suspect was Mirandized prior to arrest.";
  if (medical.checked) legal += " Medical assistance was administered prior to transport.";

  let processing = `Suspect was processed at ${processingLocation.value || "Unknown Station"}.`;
  if (mugshot.checked) processing += " Mugshot taken.";
  if (fingerprints.checked) processing += " Fingerprints collected.";
  if (dna.checked) processing += " DNA collected.";

  const narrative = `
I was involved in an incident at ${address} on ${date} at approximately ${time} hours.

Upon arrival, I observed the suspect ${name} on scene.

The suspect was detained without further incident and processed according to standard LSSD procedures.${legal}
`.trim();

  const output = `
[departmentmanual]
[/departmentmanual]

[sectionheader][b][size=200][center]ARREST REPORT[/center][/size][/b][/sectionheader]

[sectionheader][b]SUSPECT INFORMATION[/b][/sectionheader]
[sectionbody][b]Name:[/b] ${name}
[b]Vehicle:[/b] ${vehicle}
[/sectionbody]

[sectionheader][b]INCIDENT INFORMATION[/b][/sectionheader]
[sectionbody][b]Date:[/b] ${date}
[b]Time:[/b] ${time}
[b]Location:[/b] ${address}
[/sectionbody]

[sectionheader][b]CHARGES[/b][/sectionheader]
[sectionbody]${charges}[/sectionbody]

[sectionheader][b]NARRATIVE[/b][/sectionheader]
[sectionbody]${narrative}[/sectionbody]

[sectionheader][b]OFFICERS[/b][/sectionheader]
[sectionbody]${officers}[/sectionbody]

[sectionheader][b]WITNESSES[/b][/sectionheader]
[sectionbody]${witnesses}[/sectionbody]

[sectionheader][b]PROCESSING[/b][/sectionheader]
[sectionbody]${processing}[/sectionbody]
`.trim();

  outputField.value = output;

  outputField.style.height = "auto";
  outputField.style.height = outputField.scrollHeight + "px";
};

// copy
window.copyOutput = () => {
  output.select();
  document.execCommand("copy");
};

// clear
window.clearForm = () => {
  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
  selectedCharges = [];
  selectedChargesDiv.innerHTML = "";
};

});
</script>

</body>
</html>
