<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>

  <style>
    body {
      font-family: Arial;
      max-width: 1100px;
      margin: auto;
    }

    h3 {
      margin-top: 30px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .full { grid-column: span 4; }

    .box {
      display: flex;
      flex-direction: column;
    }

    .hidden {
      display: none;
    }

    textarea {
      width: 100%;
    }

    /* NOVO: layout em colunas */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<h2>LSSD Arrest Report Generator</h2>

<!-- ================= SUSPECT ================= -->
<h3>Suspect</h3>

<div class="grid">
  <div class="box">
    <label>Full Name</label>
    <input id="suspectName">
  </div>

  <div class="box">
    <label>
      <input type="checkbox" id="hasVehicle">
      Suspect had a vehicle
    </label>
  </div>
</div>

<div id="vehicleFields" class="grid hidden">
  <div class="box">
    <label>Model</label>
    <input id="vehicleModel">
  </div>

  <div class="box">
    <label>Color</label>
    <input id="vehicleColor">
  </div>

  <div class="box">
    <label>Plate</label>
    <input id="vehiclePlate">
  </div>
</div>

<!-- ================= INCIDENT ================= -->
<h3>Incident</h3>

<div class="grid">
  <div class="box">
    <label>Date</label>
    <input type="date" id="date">
  </div>

  <div class="box">
    <label>Time</label>
    <input type="time" id="time">
  </div>

  <div class="box full">
    <label>Address</label>
    <input id="address">
  </div>
</div>

<!-- ================= OFFICER ================= -->
<h3>Officer</h3>

<div class="grid">
  <div class="box">
    <label>Name</label>
    <input id="officerName">
  </div>

  <div class="box">
    <label>Rank</label>
    <input id="officerRank">
  </div>

  <div class="box">
    <label>Badge</label>
    <input id="officerBadge">
  </div>

  <div class="box">
    <label>Division</label>
    <input id="officerDivision">
  </div>
</div>

<label>
  <input type="checkbox" id="hasOfficers">
  Additional officers involved
</label>

<div id="additionalOfficers" class="hidden">
  <button onclick="addOfficer()">+ Add Additional Officer</button>
  <div id="officerList"></div>
</div>

<!-- ================= CASE DETAILS (NOVO) ================= -->
<h3>Case Details</h3>

<div class="section-grid">

  <!-- CHARGES -->
  <div class="card">
    <h4>Charges</h4>
    <input type="text" id="chargeSearch" placeholder="Search charges...">
    <div id="chargeDropdown"></div>
    <div id="selectedCharges"></div>
  </div>

  <!-- EVIDENCE -->
  <div class="card">
    <h4>Evidence</h4>
    <label>
      <input type="checkbox" id="hasEvidence"> Evidence collected
    </label>

    <div id="evidenceField" class="hidden">
      <textarea id="evidenceText" rows="3" placeholder="Weapons, drugs, other..."></textarea>
    </div>
  </div>

  <!-- WITNESSES -->
  <div class="card">
    <h4>Witnesses</h4>
    <label>
      <input type="checkbox" id="hasWitnesses"> Witnesses present
    </label>

    <div id="witnessFields" class="hidden">
      <button onclick="addWitness()">+ Add</button>
      <div id="witnessList"></div>
    </div>
  </div>

  <!-- LEGAL -->
  <div class="card">
    <h4>Legal</h4>
    <label><input type="checkbox" id="miranda"> Mirandized</label><br>
    <label><input type="checkbox" id="medical"> Medical</label>
  </div>

  <!-- PROCESSING -->
  <div class="card">
    <h4>Processing</h4>

    <input id="processingLocation" placeholder="Location"><br><br>

    <label><input type="checkbox" id="mugshot"> Mugshot</label><br>
    <label><input type="checkbox" id="fingerprints"> Fingerprints</label><br>
    <label><input type="checkbox" id="dna"> DNA</label>
  </div>

</div>

<!-- ================= OUTPUT ================= -->
<br><br>
<button onclick="generate()">Generate Report</button>

<h3>Output</h3>
<textarea id="output" rows="15"></textarea>

<!-- ================= SCRIPT ================= -->
<script>

document.getElementById("hasVehicle").onchange = function() {
  document.getElementById("vehicleFields").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasOfficers").onchange = function() {
  document.getElementById("additionalOfficers").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasEvidence").onchange = function() {
  document.getElementById("evidenceField").classList.toggle("hidden", !this.checked);
};

document.getElementById("hasWitnesses").onchange = function() {
  document.getElementById("witnessFields").classList.toggle("hidden", !this.checked);
};

function addOfficer() {}
function addWitness() {}
function generate() {}

</script>

</body>
</html>
