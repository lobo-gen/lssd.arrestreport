<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>LSSD Arrest Report Generator</title>
</head>
<body style="font-family: Arial; max-width: 700px; margin: auto;">

  <h2>LSPD Arrest Report</h2>

  <label>Suspect Name:</label><br>
  <input id="name"><br><br>

  <h3>Charges</h3>

  <input type="text" id="search" placeholder="Type to search crimes..." onkeyup="filterCrimes()">

  <div id="list"></div>

  <h4>Selected Charges:</h4>
  <ul id="selected"></ul>

  <label>Officer:</label><br>
  <input id="officer"><br><br>

  <button onclick="generate()">Generate BBCode</button>

  <h3>Output:</h3>
  <textarea id="output" rows="10" style="width:100%;"></textarea>

  <script src="crimes.js"></script>

  <script>
let selectedCrimes = [];

function renderList(filter = "") {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(crimesData).forEach(category => {
    const section = document.createElement("div");

    const title = document.createElement("h4");
    title.innerText = category;
    section.appendChild(title);

    crimesData[category].forEach(crime => {
      if (!crime.crime.toLowerCase().includes(filter.toLowerCase())) return;

      const item = document.createElement("div");

      let color = crime.classification === "Felony" ? "red" : "orange";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";

      checkbox.onchange = () => toggleCrime(crime);

      const label = document.createElement("label");
      label.style.color = color;
      label.style.cursor = "pointer";

      label.appendChild(checkbox);
      label.appendChild(document.createTextNode(
        ` ${crime.title} - ${crime.crime} (${crime.code})`
      ));

      item.appendChild(label);
      section.appendChild(item);
    });

    list.appendChild(section);
  });
}

function filterCrimes() {
  const value = document.getElementById("search").value;
  renderList(value);
}

function toggleCrime(crime) {
  const index = selectedCrimes.findIndex(c => c.title === crime.title);

  if (index > -1) {
    selectedCrimes.splice(index, 1);
  } else {
    selectedCrimes.push(crime);
  }

  updateSelected();
}

function updateSelected() {
  const ul = document.getElementById("selected");
  ul.innerHTML = "";

  selectedCrimes.forEach(c => {
    const li = document.createElement("li");
    li.innerText = `${c.crime} (${c.code})`;
    ul.appendChild(li);
  });
}

function generate() {
  let name = document.getElementById("name").value;
  let officer = document.getElementById("officer").value;

  let charges = selectedCrimes.map(c => `${c.crime} (${c.code})`).join(", ");

  let bbcode = `[b]Suspect:[/b] ${name}\n` +
               `[b]Charges:[/b] ${charges}\n` +
               `[b]Arresting Officer:[/b] ${officer}`;

  document.getElementById("output").value = bbcode;
}

// init
renderList();
  </script>

</body>
</html>
